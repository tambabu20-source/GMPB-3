name: Cập nhật dashboard GPMB Tổ công tác số 3 hằng ngày

on:
  schedule:
    # 16:00 hằng ngày theo giờ Việt Nam (UTC+7) = 09:00 UTC.
    - cron: "0 9 * * *"
  workflow_dispatch:
  push:
    paths:
      - "work/latest_progress_data.json"
      - "update_dashboard_from_progress_json.py"
      - "update_dashboard_from_drive.py"

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cập nhật dashboard từ dữ liệu mới hoặc Google Drive
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ -f work/latest_progress_data.json ] && [ "${{ github.event.head_commit.message }}" != "Chuyển nguồn tự động sang file Excel Google Drive" ]; then
            python update_dashboard_from_progress_json.py --index index.html --data work/latest_progress_data.json
          else
            python update_dashboard_from_drive.py --index index.html
          fi

      - name: Commit nếu có số liệu mới
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Không có thay đổi số liệu."
          else
            git commit -m "Tự động cập nhật dashboard GPMB Tổ công tác số 3"
            git push
          fi
