name: Cập nhật dashboard GPMB Tổ công tác số 3 hằng ngày

on:
  schedule:
    # 16:00 hằng ngày theo giờ Việt Nam (UTC+7) = 09:00 UTC.
    - cron: "0 9 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/daily-gpmb3-update.yml"
      - "workflow-trigger.txt"
      - "update_dashboard_from_drive.py"
      - "update_dashboard_from_drive_v2.py"
      - "patch_ct02_chart.py"
      - "patch_progress_safety.py"
      - "patch_locality_chart.py"

concurrency:
  group: gpmb3-dashboard-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cập nhật dashboard từ Google Drive
        run: python update_dashboard_from_drive_v2.py --index index.html

      - name: Rà soát tỷ lệ GPMB
        run: python patch_progress_safety.py --index index.html

      - name: Chuẩn hóa biểu đồ CT.02
        run: python patch_ct02_chart.py --index index.html

      - name: Sửa tỷ lệ dự án 1 và thêm biểu đồ địa phương
        run: python patch_locality_chart.py --index index.html

      - name: Commit nếu có số liệu mới
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Không có thay đổi số liệu."
          else
            git commit -m "Tự động cập nhật dashboard GPMB Tổ công tác số 3"
            git push
          fi
